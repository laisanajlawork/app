<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laisa Math Coaching</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --P:#C85555;--Pd:#A83E3E;--Pl:#FDEAEA;
  --A:#EAA624;--Al:#FEF7E0;
  --B:#767B39;--Bl:#F0F2E0;
  --V:#AADCF2;--Vl:#EAF6FC;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:linear-gradient(160deg,#FFF5F0 0%,#FEF9EE 50%,#EAF6FC 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.wrap{width:100%;max-width:400px;}

/* brand */
.brand{text-align:center;margin-bottom:2.25rem;}
.logo-ring{width:100px;height:100px;border-radius:50%;border:3px solid rgba(200,85,85,.18);box-shadow:0 6px 24px rgba(200,85,85,.14);overflow:hidden;margin:0 auto 1rem;background:#fff;}
.logo-ring img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-name{font-size:22px;font-weight:800;color:#3D1E1E;letter-spacing:-.01em;line-height:1.2;}
.brand-tagline{font-size:13px;color:#8A6060;margin-top:5px;font-weight:500;}

/* link cards */
.links{display:flex;flex-direction:column;gap:11px;margin-bottom:2rem;}
.lc{display:flex;align-items:center;gap:14px;background:#fff;border:1.5px solid #EDD8D0;border-radius:18px;padding:16px 18px 16px 16px;text-decoration:none;color:#3D1E1E;transition:transform .18s,box-shadow .18s,border-color .18s;box-shadow:0 2px 12px rgba(61,30,30,.05);}
.lc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,85,85,.13);border-color:var(--P);}
.lc:active{transform:translateY(0);}
.lc-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.ic-reg{background:var(--Al);} .ic-guru{background:var(--Pl);} .ic-ortu{background:var(--Vl);}
.lc-body{flex:1;min-width:0;}
.lc-title{font-size:15px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:7px;}
.lc-sub{font-size:11.5px;color:#8A6060;font-weight:500;line-height:1.4;}
.lc-arrow{font-size:18px;color:var(--P);font-weight:700;flex-shrink:0;opacity:.7;}
.badge-new{display:inline-block;background:var(--P);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.04em;vertical-align:middle;}

footer{text-align:center;font-size:11.5px;color:#8A6060;font-weight:500;}
footer strong{color:var(--P);}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="logo-ring"><img src="logo.png" alt="LMC Logo" onerror="this.parentNode.innerHTML='<div style=\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;background:var(--Pl)\'>📐</div>'"></div>
    <div class="brand-name">Laisa Math Coaching</div>
    <div class="brand-tagline">Platform Bimbingan Matematika Terpercaya ✨</div>
  </div>

  <div class="links">
    <!-- Ganti href di bawah dengan link Google Form pendaftaran -->
    <a href="https://forms.gle/GANTI_DENGAN_LINK_FORM" class="lc" target="_blank" rel="noopener">
      <div class="lc-icon ic-reg">📝</div>
      <div class="lc-body">
        <div class="lc-title">Pendaftaran <span class="badge-new">BARU</span></div>
        <div class="lc-sub">Daftarkan siswa baru via formulir online</div>
      </div>
      <span class="lc-arrow">›</span>
    </a>

    <a href="index.html" class="lc">
      <div class="lc-icon ic-guru">👩‍🏫</div>
      <div class="lc-body">
        <div class="lc-title">Portal Guru</div>
        <div class="lc-sub">Kelola siswa, jurnal sesi &amp; laporan</div>
      </div>
      <span class="lc-arrow">›</span>
    </a>

    <a href="ortu.html" class="lc">
      <div class="lc-icon ic-ortu">👨‍👩‍👧</div>
      <div class="lc-body">
        <div class="lc-title">Portal Orang Tua</div>
        <div class="lc-sub">Pantau perkembangan belajar anak</div>
      </div>
      <span class="lc-arrow">›</span>
    </a>
  </div>

  <footer>© 2025 <strong>Laisa Math Coaching</strong> · Semua hak dilindungi</footer>
</div>
</body>
</html>

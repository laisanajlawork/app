<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laisa Math Coaching</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --P:#C85555;--Pd:#A83E3E;--Pl:#FDEAEA;
  --A:#EAA624;--Al:#FEF7E0;
  --B:#767B39;--Bl:#F0F2E0;
  --V:#AADCF2;--Vl:#EAF6FC;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(160deg,#FFF5F0 0%,#FEF9EE 55%,#EAF6FC 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:2.5rem 1.25rem;
}
.wrap{width:100%;max-width:420px;}

/* ── Brand / profile ── */
.brand{text-align:center;margin-bottom:2rem;}
.logo-ring{
  width:96px;height:96px;border-radius:50%;
  border:3px solid rgba(200,85,85,.2);
  box-shadow:0 6px 24px rgba(200,85,85,.14);
  overflow:hidden;margin:0 auto 1rem;background:#fff;
}
.logo-ring img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-name{font-size:22px;font-weight:800;color:#3D1E1E;letter-spacing:-.01em;}
.brand-tagline{font-size:12.5px;color:#8A6060;margin-top:5px;font-weight:500;}

/* ── Link buttons (linktree style) ── */
.links{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}

.lc{
  display:flex;align-items:center;justify-content:center;gap:9px;
  min-height:54px;padding:13px 20px;
  border-radius:14px;border:1.5px solid #EDD8D0;background:#fff;
  text-decoration:none;color:#3D1E1E;font-size:14.5px;font-weight:700;
  box-shadow:0 2px 10px rgba(61,30,30,.05);
  transition:transform .18s,box-shadow .18s,border-color .18s,background .15s;
  text-align:center;letter-spacing:-.01em;
}
.lc:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(61,30,30,.1);}
.lc:active{transform:translateY(0);}

/* Per-button accent colors */
.lc-reg{border-color:#E8D07A;background:var(--Al);}
.lc-reg:hover{border-color:var(--A);background:#fffbe9;}

.lc-guru{border-color:#E8C0C0;background:var(--Pl);}
.lc-guru:hover{border-color:var(--P);background:#fde5e5;}

.lc-ortu{border-color:#BAD9EE;background:var(--Vl);}
.lc-ortu:hover{border-color:#5AACD4;background:#ddf0fb;}

.lc-wa{border-color:#A8DFC0;background:#F0FBF5;color:#1A5E38;}
.lc-wa:hover{border-color:#25D366;background:#e4f8ee;color:#0E3D20;}

.lc-ig{border-color:#F5B5CE;background:#FEF0F7;color:#8A0038;}
.lc-ig:hover{border-color:#E1306C;background:#fde0ee;color:#5E0028;}

/* ── Address card ── */
.addr-card{
  display:flex;align-items:flex-start;gap:12px;
  background:#fff;border:1.5px dashed #D8CFC0;border-radius:14px;
  padding:14px 16px;margin-bottom:22px;
  box-shadow:0 1px 6px rgba(61,30,30,.04);
}
.addr-icon{font-size:20px;flex-shrink:0;padding-top:1px;}
.addr-label{font-size:10px;font-weight:700;color:#9A7A5A;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.addr-text{font-size:13px;font-weight:600;color:#3D1E1E;line-height:1.55;}

footer{text-align:center;font-size:11.5px;color:#8A6060;font-weight:500;}
footer strong{color:var(--P);}
</style>
</head>
<body>
<div class="wrap">

  <!-- Profile -->
  <div class="brand">
    <div class="logo-ring">
      <img src="logo.png" alt="LMC Logo"
        onerror="this.parentNode.innerHTML='<div style=\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;background:#FDEAEA\'>📐</div>'">
    </div>
    <div class="brand-name">Laisa Math Coaching</div>
    <div class="brand-tagline">Platform Bimbingan Matematika Terpercaya ✨</div>
  </div>

  <!-- Links -->
  <div class="links">

    <!-- Ganti href dengan link Google Form pendaftaran -->
    <a href="https://forms.gle/GANTI_DENGAN_LINK_FORM" class="lc lc-reg" target="_blank" rel="noopener">
      📝 Pendaftaran Siswa Baru
    </a>

    <a href="index.html" class="lc lc-guru">
      👩‍🏫 Portal Guru
    </a>

    <a href="ortu.html" class="lc lc-ortu">
      👨‍👩‍👧 Portal Orang Tua
    </a>

    <!-- Ganti 628XXXXXXXXXX dengan nomor WA aktif (format: 628xxx, tanpa + di depan) -->
    <a href="https://wa.me/628XXXXXXXXXX" class="lc lc-wa" target="_blank" rel="noopener">
      💬 WhatsApp Kami
    </a>

    <!-- Ganti USERNAME_INSTAGRAM dengan username IG tanpa @ -->
    <a href="https://instagram.com/USERNAME_INSTAGRAM" class="lc lc-ig" target="_blank" rel="noopener">
      📸 Instagram
    </a>

  </div>

  <!-- Alamat -->
  <div class="addr-card">
    <div class="addr-icon">📍</div>
    <div>
      <div class="addr-label">Lokasi Bimbel</div>
      <!-- Ganti dengan alamat bimbel yang sebenarnya -->
      <div class="addr-text">Jl. [Nama Jalan], No. [Nomor]<br>[Kelurahan/Kecamatan], [Kota]</div>
    </div>
  </div>

  <footer>© 2025 <strong>Laisa Math Coaching</strong> · Semua hak dilindungi</footer>
</div>
</body>
</html>
